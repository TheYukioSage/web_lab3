<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькулятор - Головна</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        body {
    background-color: #f8f9fa;
    margin: 0;
}

#app {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
}

main {
    flex: 1;
}
        .calc-btn { height: 60px; font-size: 1.2rem; }
        .calc-display { height: 80px; font-size: 2.5rem; text-align: right; background-color: #e9ecef; }
        .nav-tabs .nav-link:not(.active) { color: rgba(255, 255, 255, 0.85); cursor: pointer; }
        .nav-tabs .nav-link:not(.active):hover { color: #ffffff; border-color: transparent; }
        .base-selector { cursor: pointer; padding: 2px 5px; border-radius: 4px; }
        .base-selector.active { background-color: #0d6efd; color: white; font-weight: bold; }
        .base-selector:not(.active):hover { background-color: #e9ecef; }
    </style>
</head>
<body>

    <div id="app">
        <header>
            <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
                <div class="container">
                    <a class="navbar-brand" href="index.html">CalcApp</a>
                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                        <span class="navbar-toggler-icon"></span>
                    </button>
                    <div class="collapse navbar-collapse" id="navbarNav">
                        <ul class="navbar-nav ms-auto">
                            <li class="nav-item"><a class="nav-link active" href="index.html">Калькулятор</a></li>
                            <li class="nav-item"><a class="nav-link" href="profile.html">Профіль</a></li>
                            <li class="nav-item"><a class="nav-link" href="about.html">Про додаток</a></li>
                            <li class="nav-item"><a class="nav-link" v-if="!isLoggedIn" href="login.html">Вхід</a></li>
                            <li class="nav-item"><a class="nav-link" v-if="!isLoggedIn" href="register.html">Реєстрація</a></li>
                            <li class="nav-item"><a class="nav-link text-danger" v-if="isLoggedIn" href="#" @click.prevent="logout">Вихід</a></li>
                        </ul>
                    </div>
                </div>
            </nav>
        </header>

        <main class="container my-5">
            <div class="row justify-content-center">
                <div class="col-md-6 col-lg-5">
                    <div class="card shadow">
                        <div class="card-header bg-primary">
                            <ul class="nav nav-tabs card-header-tabs">
                                <li class="nav-item">
                                    <a class="nav-link" :class="{ active: currentMode === 'standard' }" @click="setMode('standard')">Звичайний</a>
                                </li>
                                <li class="nav-item">
                                    <a class="nav-link" :class="{ active: currentMode === 'programmer' }" @click="setMode('programmer')">Для програміста</a>
                                </li>
                            </ul>
                        </div>
                        
                        <div class="card-body">
                            
                            <input type="text" class="form-control mb-3 calc-display" :value="display" readonly>
                            
                            <div v-if="currentMode === 'programmer'" class="mb-3 font-monospace small px-1 user-select-none">
                                <div class="base-selector" :class="{ active: currentBase === 'HEX' }" @click="setBase('HEX')">HEX: {{ hexDisplay }}</div>
                                <div class="base-selector" :class="{ active: currentBase === 'DEC' }" @click="setBase('DEC')">DEC: {{ decDisplay }}</div>
                                <div class="base-selector" :class="{ active: currentBase === 'OCT' }" @click="setBase('OCT')">OCT: {{ octDisplay }}</div>
                                <div class="base-selector" :class="{ active: currentBase === 'BIN' }" @click="setBase('BIN')">BIN: {{ binDisplay }}</div>
                            </div>

                            <div v-if="currentMode === 'standard'" class="row g-2">
                                <div class="col-3"><button class="btn btn-secondary w-100 calc-btn" @click="clear">C</button></div>
                                <div class="col-3"><button class="btn btn-secondary w-100 calc-btn" @click="calculateUnary('±')">±</button></div>
                                <div class="col-3"><button class="btn btn-secondary w-100 calc-btn" @click="calculateUnary('%')">%</button></div>
                                <div class="col-3"><button class="btn btn-warning w-100 calc-btn" :class="{ 'bg-danger text-white': operator === '/' }" @click="setOperation('/')">÷</button></div>
                                
                                <div class="col-3"><button class="btn btn-light w-100 calc-btn" @click="inputChar('7')">7</button></div>
                                <div class="col-3"><button class="btn btn-light w-100 calc-btn" @click="inputChar('8')">8</button></div>
                                <div class="col-3"><button class="btn btn-light w-100 calc-btn" @click="inputChar('9')">9</button></div>
                                <div class="col-3"><button class="btn btn-warning w-100 calc-btn" :class="{ 'bg-danger text-white': operator === '*' }" @click="setOperation('*')">×</button></div>
                                
                                <div class="col-3"><button class="btn btn-light w-100 calc-btn" @click="inputChar('4')">4</button></div>
                                <div class="col-3"><button class="btn btn-light w-100 calc-btn" @click="inputChar('5')">5</button></div>
                                <div class="col-3"><button class="btn btn-light w-100 calc-btn" @click="inputChar('6')">6</button></div>
                                <div class="col-3"><button class="btn btn-warning w-100 calc-btn" :class="{ 'bg-danger text-white': operator === '-' }" @click="setOperation('-')">-</button></div>
                                
                                <div class="col-3"><button class="btn btn-light w-100 calc-btn" @click="inputChar('1')">1</button></div>
                                <div class="col-3"><button class="btn btn-light w-100 calc-btn" @click="inputChar('2')">2</button></div>
                                <div class="col-3"><button class="btn btn-light w-100 calc-btn" @click="inputChar('3')">3</button></div>
                                <div class="col-3"><button class="btn btn-warning w-100 calc-btn" :class="{ 'bg-danger text-white': operator === '+' }" @click="setOperation('+')">+</button></div>
                                
                                <div class="col-6"><button class="btn btn-light w-100 calc-btn" @click="inputChar('0')">0</button></div>
                                <div class="col-3"><button class="btn btn-light w-100 calc-btn" @click="inputChar(',')">,</button></div>
                                <div class="col-3"><button class="btn btn-success w-100 calc-btn" @click="calculate">=</button></div>
                            </div>

                            <div v-if="currentMode === 'programmer'" class="row g-2">
                                <div class="col-3"><button class="btn btn-secondary w-100 calc-btn" @click="clear">C</button></div>
                                <div class="col-3"><button class="btn btn-outline-secondary w-100 calc-btn" :disabled="isKeyDisabled('A')" @click="inputChar('A')">A</button></div>
                                <div class="col-3"><button class="btn btn-outline-secondary w-100 calc-btn" :disabled="isKeyDisabled('B')" @click="inputChar('B')">B</button></div>
                                <div class="col-3"><button class="btn btn-warning w-100 calc-btn text-dark" :class="{ 'bg-danger text-white': operator === 'AND' }" @click="setOperation('AND')">AND</button></div>
                                
                                <div class="col-3"><button class="btn btn-outline-secondary w-100 calc-btn" :disabled="isKeyDisabled('C')" @click="inputChar('C')">C</button></div>
                                <div class="col-3"><button class="btn btn-outline-secondary w-100 calc-btn" :disabled="isKeyDisabled('D')" @click="inputChar('D')">D</button></div>
                                <div class="col-3"><button class="btn btn-outline-secondary w-100 calc-btn" :disabled="isKeyDisabled('E')" @click="inputChar('E')">E</button></div>
                                <div class="col-3"><button class="btn btn-warning w-100 calc-btn text-dark" :class="{ 'bg-danger text-white': operator === 'OR' }" @click="setOperation('OR')">OR</button></div>
                                
                                <div class="col-3"><button class="btn btn-outline-secondary w-100 calc-btn" :disabled="isKeyDisabled('F')" @click="inputChar('F')">F</button></div>
                                <div class="col-3"><button class="btn btn-light w-100 calc-btn" :disabled="isKeyDisabled('7')" @click="inputChar('7')">7</button></div>
                                <div class="col-3"><button class="btn btn-light w-100 calc-btn" :disabled="isKeyDisabled('8')" @click="inputChar('8')">8</button></div>
                                <div class="col-3"><button class="btn btn-warning w-100 calc-btn text-dark" :class="{ 'bg-danger text-white': operator === 'XOR' }" @click="setOperation('XOR')">XOR</button></div>
                                
                                <div class="col-3"><button class="btn btn-light w-100 calc-btn" :disabled="isKeyDisabled('4')" @click="inputChar('4')">4</button></div>
                                <div class="col-3"><button class="btn btn-light w-100 calc-btn" :disabled="isKeyDisabled('5')" @click="inputChar('5')">5</button></div>
                                <div class="col-3"><button class="btn btn-light w-100 calc-btn" :disabled="isKeyDisabled('6')" @click="inputChar('6')">6</button></div>
                                <div class="col-3"><button class="btn btn-warning w-100 calc-btn text-dark" @click="calculateUnary('NOT')">NOT</button></div>
                                
                                <div class="col-3"><button class="btn btn-light w-100 calc-btn" :disabled="isKeyDisabled('1')" @click="inputChar('1')">1</button></div>
                                <div class="col-3"><button class="btn btn-light w-100 calc-btn" :disabled="isKeyDisabled('2')" @click="inputChar('2')">2</button></div>
                                <div class="col-3"><button class="btn btn-light w-100 calc-btn" :disabled="isKeyDisabled('3')" @click="inputChar('3')">3</button></div>
                                <div class="col-3"><button class="btn btn-warning w-100 calc-btn text-dark" :class="{ 'bg-danger text-white': operator === '<<' }" @click="setOperation('<<')">&lt;&lt;</button></div>
                                
                                <div class="col-3"><button class="btn btn-light w-100 calc-btn" :disabled="isKeyDisabled('0')" @click="inputChar('0')">0</button></div>
                                <div class="col-3"><button class="btn btn-light w-100 calc-btn" :disabled="isKeyDisabled('9')" @click="inputChar('9')">9</button></div>
                                <div class="col-3"><button class="btn btn-success w-100 calc-btn" @click="calculate">=</button></div>
                                <div class="col-3"><button class="btn btn-warning w-100 calc-btn text-dark" :class="{ 'bg-danger text-white': operator === '>>' }" @click="setOperation('>>')">&gt;&gt;</button></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <footer class="bg-dark text-white text-center py-3 mt-auto">
            <div class="container"><p class="mb-0">&copy; 2026 CalcApp. Розробив: Андрій Кравець, КВ-32.</p></div>
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const { createApp } = Vue;

        createApp({
            data() {
                return {
                    isLoggedIn: false,
                    currentMode: 'standard', 
                    display: '0',
                    previousValue: null,
                    operator: null,
                    waitingForNewValue: false,
                    currentBase: 'DEC' 
                };
            },
            mounted() {
                this.isLoggedIn = !!localStorage.getItem('user');
            },
            computed: {
                decValue() {
                    if (this.display === 'Error') return 0;
                    let val = parseInt(this.display, this.getBaseRadix(this.currentBase));
                    return isNaN(val) ? 0 : val;
                },
                hexDisplay() { return (this.decValue >>> 0).toString(16).toUpperCase(); },
                decDisplay() { return this.decValue.toString(10); },
                octDisplay() { return (this.decValue >>> 0).toString(8); },
                binDisplay() {
                    let bin = (this.decValue >>> 0).toString(2);
                    return bin.padStart(8, '0').replace(/\B(?=(.{4})+(?!.))/g, " ");
                }
            },
            methods: {
                logout() {
                    localStorage.removeItem('user');
                    window.location.href = 'login.html';
                },
                setMode(mode) {
                    this.currentMode = mode;
                    this.clear();
                },
                getBaseRadix(base) {
                    const bases = { 'HEX': 16, 'DEC': 10, 'OCT': 8, 'BIN': 2 };
                    return bases[base] || 10;
                },
                setBase(base) {
                    let val = parseInt(this.display, this.getBaseRadix(this.currentBase));
                    if (isNaN(val)) val = 0;
                    this.currentBase = base;
                    this.display = (val >>> 0).toString(this.getBaseRadix(base)).toUpperCase();
                    this.waitingForNewValue = true;
                },
                isKeyDisabled(key) {
                    const radix = this.getBaseRadix(this.currentBase);
                    const val = parseInt(key, 16);
                    return val >= radix;
                },
                clear() {
                    this.display = '0';
                    this.previousValue = null;
                    this.operator = null;
                    this.waitingForNewValue = false;
                },
                inputChar(char) {
                    if (this.waitingForNewValue) {
                        this.display = char === ',' ? '0,' : char;
                        this.waitingForNewValue = false;
                    } else {
                        if (char === ',' && this.display.includes(',')) return;
                        this.display = this.display === '0' && char !== ',' ? char : this.display + char;
                    }
                },
                setOperation(op) {
                    if (this.operator !== null && !this.waitingForNewValue) {
                        this.calculate();
                    }
                    this.previousValue = this.display;
                    this.operator = op;
                    this.waitingForNewValue = true;
                },
                calculateUnary(op) {
                    if (this.display === 'Error') return;
                    
                    if (this.currentMode === 'standard') {
                        let current = parseFloat(this.display.replace(',', '.'));
                        if (op === '±') current = -current;
                        if (op === '%') current = current / 100;
                        this.display = String(current).replace('.', ',');
                    } else {
                        const radix = this.getBaseRadix(this.currentBase);
                        let current = parseInt(this.display, radix);
                        if (op === 'NOT') {
                            current = ~current;
                            this.display = (current >>> 0).toString(radix).toUpperCase();
                        }
                    }
                    this.waitingForNewValue = true;
                },
                calculate() {
                    if (this.operator === null || this.waitingForNewValue) return;

                    let result = 0;
                    if (this.currentMode === 'standard') {
                        const prev = parseFloat(this.previousValue.replace(',', '.'));
                        const current = parseFloat(this.display.replace(',', '.'));
                        
                        switch(this.operator) {
                            case '+': result = prev + current; break;
                            case '-': result = prev - current; break;
                            case '*': result = prev * current; break;
                            case '/': result = current !== 0 ? prev / current : 'Error'; break;
                        }
                        
                        if (result !== 'Error') {
                            result = Math.round(result * 100000000) / 100000000;
                            this.display = String(result).replace('.', ',');
                        } else {
                            this.display = 'Error';
                        }
                    } else {
                        const radix = this.getBaseRadix(this.currentBase);
                        const prev = parseInt(this.previousValue, radix);
                        const current = parseInt(this.display, radix);

                        switch(this.operator) {
                            case 'AND': result = prev & current; break;
                            case 'OR': result = prev | current; break;
                            case 'XOR': result = prev ^ current; break;
                            case '<<': result = prev << current; break;
                            case '>>': result = prev >> current; break;
                        }
                        this.display = (result >>> 0).toString(radix).toUpperCase();
                    }

                    this.operator = null;
                    this.waitingForNewValue = true;
                }
            }
        }).mount('#app');
    </script>
</body>
</html>
