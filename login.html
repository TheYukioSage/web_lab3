<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькулятор - Вхід</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        body {
    background-color: #f8f9fa;
    margin: 0;
}

#app {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
}

main {
    flex: 1;
}
    </style>
</head>
<body>

    <header>
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
            <div class="container">
                <a class="navbar-brand" href="index.html">CalcApp</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item"><a class="nav-link" href="index.html">Калькулятор</a></li>
                        <li class="nav-item"><a class="nav-link" href="profile.html">Профіль</a></li>
                        <li class="nav-item"><a class="nav-link" href="about.html">Про додаток</a></li>
                        <li class="nav-item"><a class="nav-link active" href="login.html">Вхід</a></li>
                        <li class="nav-item"><a class="nav-link" href="register.html">Реєстрація</a></li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main id="app" class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-4">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white text-center">
                        <h4 class="mb-0">Вхід до сайту</h4>
                    </div>
                    <div class="card-body">

                        <div v-if="message" :class="['alert', isError ? 'alert-danger' : 'alert-success']" role="alert">
                            {{ message }}
                        </div>

                        <form @submit.prevent="loginUser">
                            <div class="mb-3">
                                <label for="email" class="form-label">Email адреса</label>
                                <input type="email" class="form-control" id="email" v-model="credentials.email" placeholder="name@example.com" required>
                            </div>
                            <div class="mb-3">
                                <label for="password" class="form-label">Пароль</label>
                                <input type="password" class="form-control" id="password" v-model="credentials.password" placeholder="Введіть пароль" required>
                            </div>
                            <div class="mb-3 form-check">
                                <input type="checkbox" class="form-check-input" id="rememberMe" v-model="credentials.rememberMe">
                                <label class="form-check-label" for="rememberMe">Запам'ятати мене</label>
                            </div>
                            
                            <button type="submit" class="btn btn-primary w-100" :disabled="isLoading">
                                <span v-if="isLoading" class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
                                {{ isLoading ? 'Вхід...' : 'Увійти' }}
                            </button>
                        </form>
                    </div>
                    <div class="card-footer text-center py-3">
                        <div class="small">Немає акаунту? <a href="register.html">Зареєструватися</a></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-dark text-white text-center py-3 mt-auto">
        <div class="container"><p class="mb-0">&copy; 2026 CalcApp. Розробив: Андрій Кравець, КВ-32.</p></div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        const { createApp } = Vue;

        createApp({
            data() {
                return {
                    credentials: {
                        email: '',
                        password: '',
                        rememberMe: false
                    },
                    isLoading: false,
                    message: '',
                    isError: false
                }
            },
            methods: {
                async loginUser() {
                    this.isLoading = true;
                    this.message = '';
                    this.isError = false;

                    try {
                        // Відправка POST запиту на сервер для перевірки даних
                        const response = await axios.post('http://localhost:3000/api/login', this.credentials);
                        
                        this.message = 'Вхід успішний! Перенаправлення...';
                        
                        // Зберігаємо дані користувача локально (імітація сесії)
                        localStorage.setItem('user', JSON.stringify(response.data.user || this.credentials.email));
                        
                        // Перенаправлення у профіль
                        setTimeout(() => {
                            window.location.href = 'profile.html';
                        }, 1000);

                    } catch (error) {
                        this.isError = true;
                        if (error.response && error.response.status === 401) {
                            this.message = 'Невірний email або пароль.';
                        } else {
                            this.message = 'Помилка з\'єднання з сервером. Перевірте, чи запущено бекенд.';
                        }
                    } finally {
                        this.isLoading = false;
                    }
                }
            }
        }).mount('#app');
    </script>
</body>
</html>
